<!DOCTYPE html>
<html>
<head>
    <title>Gallery - Victory Church</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
        }

        header {
            background: #0d1b5e;
            color: white;
            padding: 15px 30px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gold;
        }

        h1 {
            margin: 20px;
        }

        /* GALLERY GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        footer {
            background: #0d1b5e;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Victory Church Gallery</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<!-- GALLERY -->
<div class="gallery">

<img src="images/g1.jpg">
<img src="images/g1.jpg">
<img src="images/g1.jpg">
<img src="images/g1.jpg">
<img src="images/g1.jpg">
</div>

<footer>
    <p>© 2026 Victory Church of Christ Ministries International</p>
</footer>

</body>
</html>
